# ============================================================
# Validation messages  -  English (default)
# Key format: {AnnotationName}.{modelAttributeName}.{fieldName}
# For @Size: {1}=max, {2}=min  (Spring passes attributes alphabetically)
# ============================================================

# ------------------------------------------------------------
# TeacherInsertDTO
# ------------------------------------------------------------
NotNull.teacherInsertDTO.firstname                      = First name is required
Size.teacherInsertDTO.firstname                         = First name must be at least {2} characters long
NotNull.teacherInsertDTO.lastname                       = Last name is required
Size.teacherInsertDTO.lastname                          = Last name must be at least {2} characters long
Pattern.teacherInsertDTO.vat                            = VAT number must contain at least 9 digits
NotNull.teacherInsertDTO.regionId                       = Region is required
NotNull.teacherInsertDTO.userInsertDTO                  = User account information is required
NotNull.teacherInsertDTO.personalInfoInsertDTO          = Personal information is required

# ------------------------------------------------------------
# TeacherUpdateDTO
# ------------------------------------------------------------
NotNull.teacherUpdateDTO.uuid                           = Teacher identifier (UUID) is required
NotNull.teacherUpdateDTO.firstname                      = First name is required
Size.teacherUpdateDTO.firstname                         = First name must be at least {2} characters long
NotNull.teacherUpdateDTO.lastname                       = Last name is required
Size.teacherUpdateDTO.lastname                          = Last name must be at least {2} characters long
Pattern.teacherUpdateDTO.vat                            = VAT number must contain at least 9 digits
NotNull.teacherUpdateDTO.regionId                       = Region is required
NotNull.teacherUpdateDTO.userUpdateDTO                  = User account information is required
NotNull.teacherUpdateDTO.personalInfoUpdateDTO          = Personal information is required

# ------------------------------------------------------------
# UserInsertDTO
# ------------------------------------------------------------
NotNull.userInsertDTO.username                          = Username is required
Size.userInsertDTO.username                             = Username must be between {2} and {1} characters
NotNull.userInsertDTO.password                          = Password is required
Pattern.userInsertDTO.password                          = Password must be at least 8 characters and include at least one digit, one lowercase letter, one uppercase letter, and one special character (!@#$%^&+=)
NotNull.userInsertDTO.roleId                            = User role is required

# ------------------------------------------------------------
# UserUpdateDTO
# ------------------------------------------------------------
NotNull.userUpdateDTO.username                          = Username is required
Size.userUpdateDTO.username                             = Username must be between {2} and {1} characters
NotNull.userUpdateDTO.password                          = Password is required
Pattern.userUpdateDTO.password                          = Password must be at least 8 characters and include at least one digit, one lowercase letter, one uppercase letter, and one special character (!@#$%^&+=)

# ------------------------------------------------------------
# PersonalInfoInsertDTO
# ------------------------------------------------------------
NotNull.personalInfoInsertDTO.amka                      = AMKA is required
Pattern.personalInfoInsertDTO.amka                      = AMKA must be exactly 11 digits
NotBlank.personalInfoInsertDTO.identityNumber           = Identity number is required
NotBlank.personalInfoInsertDTO.placeOfBirth             = Place of birth is required
NotBlank.personalInfoInsertDTO.municipalityOfRegistration = Municipality of registration is required

# ------------------------------------------------------------
# PersonalInfoUpdateDTO
# ------------------------------------------------------------
NotEmpty.personalInfoUpdateDTO.amka                     = AMKA is required
Pattern.personalInfoUpdateDTO.amka                      = AMKA must be exactly 11 digits
NotEmpty.personalInfoUpdateDTO.identityNumber           = Identity number is required
NotEmpty.personalInfoUpdateDTO.placeOfBirth             = Place of birth is required
NotEmpty.personalInfoUpdateDTO.municipalityOfRegistration = Municipality of registration is required

# ------------------------------------------------------------
# AuthenticationRequestDTO
# ------------------------------------------------------------
NotNull.authenticationRequestDTO.username               = Username is required
NotNull.authenticationRequestDTO.password               = Password is required

#--------------------------------------------------------------
# Exception Messages
#--------------------------------------------------------------
TEACHER_NOT_FOUND=Teacher with uuid={0} not found